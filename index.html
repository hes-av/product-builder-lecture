<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro-LED & 로또 추천기</title>
    <!-- CSS Linking -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Micro-LED 기술 소개</h1>
    <p>차세대 디스플레이 혁신 기술</p>
    <button id="theme-toggle">🌙 다크 모드</button>
</header>

<section>
    <div class="box">
        <h2>Micro-LED란?</h2>
        <p>
            Micro-LED는 초소형 LED를 개별 픽셀로 사용하는 차세대 디스플레이 기술입니다.
            OLED보다 밝기와 수명이 뛰어나고 번인 현상이 거의 없습니다.
            차세대 TV, 스마트워치, AR기기에 활용됩니다.
        </p>
    </div>

    <div class="box">
        <h2>🎰 로또 번호 추천기 (중복 조합 방지)</h2>
        <div class="controls">
            <button onclick="generateOne()">1게임 추천</button>
            <button onclick="generateFive()">5게임 추천</button>
            <button class="reset-btn" onclick="resetLotto()">초기화</button>
        </div>
        <div id="lottoResult"></div>
    </div>
</section>

<footer>
    ⓒ 2026 Micro-LED & Lotto Web Practice
</footer>

<!-- JS Linking -->
<script src="main.js"></script>
</body>
</html>
