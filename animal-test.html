<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동물상 테스트 - 나를 닮은 동물은?</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>

<header>
    <h1>AI 동물상 테스트</h1>
    <p>나와 닮은 동물은? (강아지 vs 고양이)</p>
    <button id="theme-toggle">🌙 다크 모드</button>
</header>

<nav style="margin-top: 20px;">
    <a href="index.html" style="color: var(--primary-color); text-decoration: none; font-weight: bold;">← 메인으로 돌아가기</a>
</nav>

<section>
    <div class="box ai-section">
        <h2>🐶 AI 동물상 테스트 🐱</h2>
        <p>사진을 업로드하면 AI가 분석해 드립니다.</p>
        
        <div class="upload-area" id="upload-area">
            <input type="file" id="image-input" accept="image/*" hidden>
            <div id="preview-container">
                <img id="face-image" src="" alt="Face Preview" style="display: none; max-width: 100%; border-radius: 15px;">
                <div id="placeholder">
                    <p>📸 클릭하여 사진 업로드</p>
                </div>
            </div>
        </div>

        <div id="loading" style="display: none; margin: 20px;">
            <p>AI 분석 중... 🤖</p>
        </div>

        <div id="result-container" style="display: none; margin-top: 30px;">
            <h3 id="result-message">분석 결과</h3>
            <div id="label-container"></div>
            <button onclick="location.reload()" style="margin-top: 20px; background-color: #555;">다시 하기</button>
        </div>
    </div>
</section>

<footer>
    ⓒ 2026 AI Animal Face Test Practice
</footer>

<script src="animal-test.js"></script>
</body>
</html>
